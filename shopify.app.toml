# Customer Harmony — Shopify App Configuration
# Replace YOUR_API_KEY_HERE with the client_id from Partner Dashboard after creating the app.

client_id = "fe48674949fdd16d375d47ffa74b5de3"
name = "Customer Harmony"
application_url = "https://customer-harmony.vercel.app"
embedded = true

[access_scopes]
# write_customer_merge is required by the customerMerge GraphQL mutation.
# read_orders is required to receive orders/create and orders/updated webhooks.
# write_orders is NOT needed — the app never calls Shopify's write-orders API.
scopes = "read_customers,write_customers,write_customer_merge,read_orders"

[auth]
redirect_urls = [
  "https://identity-manager-4ew0.onrender.com/auth/shopify/callback"
]

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  topics = ["customers/create", "customers/update", "customers/delete"]
  uri = "/api/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["orders/create", "orders/updated"]
  uri = "/api/webhooks/shopify"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/shopify"

# GDPR / privacy-compliance webhooks.
# For apps using shopify.app.toml the Partner Dashboard no longer shows a
# manual GDPR section — these must be declared here and pushed via
# `shopify app deploy`. All three topics are handled by the same endpoint;
# the handler dispatches on the X-Shopify-Topic header.
[webhooks.privacy_compliance]
  customer_deletion_url    = "https://identity-manager-4ew0.onrender.com/api/webhooks/shopify"
  customer_data_request_url = "https://identity-manager-4ew0.onrender.com/api/webhooks/shopify"
  shop_deletion_url        = "https://identity-manager-4ew0.onrender.com/api/webhooks/shopify"
